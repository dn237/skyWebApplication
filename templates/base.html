{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Web Application</title>
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="menu-icon"></div>
        </div>

        <nav class="sidebar-nav">
            <a href="/" class="smart-button">Dashboard</a>
            <a href="/organisation/" class="smart-button">Organisation</a>
            <a href="/teams/" class="smart-button">Teams</a>
            <a href="/messages/" class="smart-button">Messages</a>
            <a href="/schedule/" class="smart-button">Schedule</a>
            <a href="/settings/" class="smart-button">Settings</a>
        </nav>

        <div class="user-footer">
            <div class="avatar"></div>
            <div class="user-info">
                <span class="user-name">John Doe</span>
                <div class="log-off-group">
                    <span class="log-off-text">Log off</span>
                    <div class="logout-icon"></div>
                </div>
            </div>
        </div>
    </aside>

    <main style="margin-left: 301px; padding: 40px;">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
