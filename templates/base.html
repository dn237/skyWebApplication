{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Web Application</title>
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="main-theme">
    <header class="top-bar">
        <div class="logo">
            <img src="{% static 'images/sky_logo.png' %}" alt="Sky">
        </div>
        <div class="top-nav">
            <a href="#" class="contact-support">Contact Support</a>
            <div class="language-picker">English</div>
        </div>
    </header>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="menu-icon">
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="smart-button{% if request.path == '/' %} active{% endif %}">Dashboard</a>
            <a href="/organisation/" class="smart-button{% if request.path|slice:':14' == '/organisation/' %} active{% endif %}">Organisation</a>
            <a href="/teams/" class="smart-button{% if request.path|slice:':7' == '/teams/' %} active{% endif %}">Teams</a>
            <a href="/messages/" class="smart-button{% if request.path|slice:':10' == '/messages/' %} active{% endif %}">Messages</a>
            <a href="/schedule/" class="smart-button{% if request.path|slice:':10' == '/schedule/' %} active{% endif %}">Schedule</a>
            <a href="/settings/" class="smart-button{% if request.path|slice:':10' == '/settings/' %} active{% endif %}">Settings</a>
        </nav>

        <div class="user-footer">
            <div class="avatar"></div>
            <div class="user-info">
                <span class="user-name">John Doe</span>
                <div class="log-off-group">
                    <span class="log-off-text">Log off</span>
                    <div class="logout-icon"></div>
                </div>
            </div>
        </div>
    </aside>

    <div class="app-body">
        <main class="page-content">
            <div class="content-container"> {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>

    <footer class="bottom-bar">
        <div class="footer-group">
            <a href="#" class="footer-links">Privacy policy</a>
            <a href="#" class="footer-links">Terms of Service</a>
            <a href="#" class="footer-links">Security</a>
        </div>
    </footer>

</body>
</html>
