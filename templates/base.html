<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sky Web Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body class="main-theme">
    
    <header class="top-bar">
        <div class="logo">
            <img src="{% static 'images/sky_logo.png' %}" alt="Sky">
        </div>
        <div class="top-nav">
            <a href="#" class="contact-support">Contact Support</a>
            <div class="language-picker">English</div>
        </div>
    </header>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="menu-icon">
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="{% url 'dashboard' %}" 
                class="smart-button {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                <span class="material-symbols-outlined">dashboard</span> Dashboard
            </a>
            <a href="{% url 'teams:index' %}" 
                class="smart-button {% if 'teams' in request.path %}active{% endif %}">
                <span class="material-symbols-outlined">groups</span> Teams
            </a>
            <a href="{% url 'messages:inbox' %}" 
                class="smart-button {% if 'messages' in request.path %}active{% endif %}" >
                <span class="material-symbols-outlined">mail</span> Messages
            </a>
            <a href="{% url 'organizations:dept' %}" 
                class="smart-button{% if request.resolver_match.namespace == 'organizations' %} active{% endif %}">
                <span class="material-symbols-outlined">apartment</span> Organisation
            </a>
            <a href="{% url 'scheduler:schedule_list' %}" 
                class="smart-button {% if 'schedules' in request.path %}active{% endif %}">
                <span class="material-symbols-outlined">schedule</span> Scheduler
            </a>
            <a href="/settings/" 
                class="smart-button{% if request.path|slice:':10' == '/settings/' %} active{% endif %}">
                <span class="material-symbols-outlined">settings</span> Settings
            </a>
        </nav>

        <div class="user-footer">
            <div class="avatar"></div>
            <div class="user-info">
                <span class="user-name">John Doe</span>
                <div class="log-off-group">
                    <span class="log-off-text">Log off</span>
                    <div class="logout-icon"></div>
                </div>
            </div>
        </div>
    </aside>

    <div class="app-body">
        <main class="page-content">
            <div class="content-container container-fluid px-4 py-3"> 
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>

    <footer class="bottom-bar">
        <div class="footer-group">
            <a href="#" class="footer-links">Privacy policy</a>
            <a href="#" class="footer-links">Terms of Service</a>
            <a href="#" class="footer-links">Security</a>
        </div>
    </footer>

    <script>
        (function () {
            var mediaQuery = window.matchMedia('(max-width: 768px)');
            var lastScrollY = window.scrollY;
            var threshold = 8;

            function applyTopBarBehavior() {
                if (!mediaQuery.matches) {
                    document.body.classList.remove('mobile-topbar-hidden');
                    lastScrollY = window.scrollY;
                    return;
                }

                var currentY = window.scrollY;

                if (currentY <= 12) {
                    document.body.classList.remove('mobile-topbar-hidden');
                    lastScrollY = currentY;
                    return;
                }

                var delta = currentY - lastScrollY;

                if (delta > threshold) {
                    document.body.classList.add('mobile-topbar-hidden');
                } else if (delta < -threshold) {
                    document.body.classList.remove('mobile-topbar-hidden');
                }

                lastScrollY = currentY;
            }

            window.addEventListener('scroll', applyTopBarBehavior, { passive: true });
            window.addEventListener('resize', applyTopBarBehavior);
            window.addEventListener('orientationchange', applyTopBarBehavior);

            applyTopBarBehavior();
        })();
    </script>

</body>
</html>
