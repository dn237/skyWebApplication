{% extends 'base.html' %}

{% block content %}
<div class="page-stack">
    <h1 class="page-title">Reports Summary</h1>

    <!-- Download buttons -->
    <div class="card mb-3 p-3">
        <h5>Download Reports</h5>
        <a href="{% url 'download_excel' %}" class="btn btn-success me-2">
            Download Excel
        </a>
        <a href="{% url 'download_pdf' %}" class="btn btn-danger">
            Download PDF
        </a>
    </div>

    <!-- User table -->
    <div class="card p-3">
        <h5>User Data</h5>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody>
                {% for u in users %}
                <tr>
                    <td>{{ u.username }}</td>
                    <td>{{ u.email }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2">No data available</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
