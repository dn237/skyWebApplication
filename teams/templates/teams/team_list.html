{% extends 'base.html' %}

{% block content %}
    <div class = "page-header">
        <div class = "search-bar">
            <input type="text" placeholder="Search teams...">
        </div>
        <div class="dropdown">
            <button class="dropdown-button">All Departments ▼</button>
            <div class="dropdown-content">
                {% for department in departments %}
                    <label class="dropdown-option" for="department-{{ forloop.counter }}">
                        <input type="checkbox" id="department-{{ forloop.counter }}" name="departments" value="{{ department }}">
                        <span>{{ department }}</span>
                    </label>
                {% empty %}
                    <div class="dropdown-empty">No departments available</div>
                {% endfor %}
            </div>
        </div>
    </div>
    

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px;">
        <div class="card">
            {% for team in teams %}
                <div class="card-item">
                    <div class="card-header">
                        <h3>{{ team.name }}</h3>
                    </div>
                    <div class="card-body">
                        <p>{{ team.description }}</p>
                    </div>
                </div>
            {% empty %}
                <p>No teams found.</p>
            {% endfor %}
    </div>

    

{% endblock %}
